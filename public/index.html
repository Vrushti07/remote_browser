<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Remote Browser</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; height: 100vh; }
  #toolbar { display: flex; gap: 8px; padding: 8px 12px; background: #1a1a1a; align-items: center; border-bottom: 1px solid #333; }
  #toolbar button { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; }
  #startBtn  { background: #2e7d32; color: #fff; }
  #stopBtn   { background: #c62828; color: #fff; }
  #urlBar    { flex: 1; padding: 6px 10px; border-radius: 6px; border: 1px solid #444; background: #222; color: #eee; font-size: 13px; }
  #goBtn     { background: #1565c0; color: #fff; padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; }
  #status    { font-size: 12px; color: #aaa; min-width: 80px; }
  #viewport  { flex: 1; overflow: hidden; position: relative; cursor: crosshair; }
  #screen    { width: 100%; height: 100%; object-fit: contain; display: block; }
  #placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #555; font-size: 16px; }
</style>
</head>
<body>

<div id="toolbar">
  <button id="startBtn">▶ Start Browser</button>
  <button id="stopBtn">■ Stop</button>
  <input id="urlBar" type="text" value="https://example.com" placeholder="https://..."/>
  <button id="goBtn">Go</button>
  <span id="status">Idle</span>
</div>

<div id="viewport">
  <img id="screen" alt="browser screen"/>
  <div id="placeholder">Click "Start Browser" to begin</div>
</div>

<script>
  const ws = new WebSocket(`ws://${location.host}`);
  const screen = document.getElementById('screen');
  const placeholder = document.getElementById('placeholder');
  const status = document.getElementById('status');
  const viewport = document.getElementById('viewport');

  ws.onmessage = async (e) => {
  let msg;
  if (e.data instanceof Blob) {
    const text = await e.data.text();
    msg = JSON.parse(text);
  } else {
    msg = JSON.parse(e.data);
  }

  if (msg.type === 'frame') {
    screen.src = 'data:image/jpeg;base64,' + msg.data;
    placeholder.style.display = 'none';
  }
  if (msg.type === 'status') status.textContent = msg.status;
  };

  const send = (obj) => { if (ws.readyState === 1) ws.send(JSON.stringify(obj)); };

  document.getElementById('startBtn').onclick = () => {
    status.textContent = 'Starting…';
    send({ type: 'start' });
  };
  document.getElementById('stopBtn').onclick = () => {
    send({ type: 'stop' });
    screen.src = '';
    placeholder.style.display = 'flex';
    placeholder.textContent = 'Stopped. Click Start to relaunch.';
  };
  document.getElementById('goBtn').onclick = () => {
    send({ type: 'navigate', url: document.getElementById('urlBar').value });
  };

  // Map mouse events to Puppeteer coordinates (Chromium is 1280×800)
  function toRemote(e) {
    const r = viewport.getBoundingClientRect();
    return {
      x: Math.round((e.clientX - r.left) / r.width  * 1280),
      y: Math.round((e.clientY - r.top)  / r.height * 800),
    };
  }

  viewport.addEventListener('click',     (e) => send({ type: 'click',  ...toRemote(e) }));
  viewport.addEventListener('mousemove', (e) => send({ type: 'move',   ...toRemote(e) }));
  viewport.addEventListener('wheel',     (e) => send({ type: 'scroll', deltaY: e.deltaY }));
  document.addEventListener('keydown',   (e) => {
    if (document.activeElement === document.getElementById('urlBar')) return;
    send({ type: 'keydown', key: e.key });
  });
</script>
</body>
</html>
